<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html,body{margin:0;width:400px;height:400px;overflow:hidden;background:#050608;font-family:system-ui,-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Arial,sans-serif}
    .a{position:relative;width:400px;height:400px;background:radial-gradient(circle at 62% 28%,rgba(216,168,74,.24),transparent 150px),radial-gradient(circle at 30% 18%,rgba(47,108,255,.26),transparent 165px),linear-gradient(145deg,#11151d,#050608)}
    .a:before{content:"";position:absolute;inset:26px;border:1px solid rgba(245,246,242,.14)}
    .ring{position:absolute;inset:45px;border-radius:50%;border:2px solid rgba(216,168,74,.58);box-shadow:inset 0 1px rgba(255,255,255,.15),0 25px 90px rgba(0,0,0,.48)}
    .ring:before{content:"";position:absolute;inset:34px;border-radius:50%;border:1px solid rgba(245,246,242,.22)}
    .logo{position:absolute;left:92px;top:72px;width:216px;height:216px;filter:drop-shadow(0 28px 38px rgba(0,0,0,.5))}
    .bar{position:absolute;left:126px;right:126px;top:292px;height:5px;background:#d8a84a;box-shadow:0 0 24px rgba(216,168,74,.35)}
    .name{position:absolute;left:0;right:0;top:323px;text-align:center;color:#f4d38b;font-size:24px;font-weight:850;letter-spacing:.10em}
  </style>
</head>
<body>
  <div class="a"><div class="ring"></div><img class="logo" src="../brand/firepoint-mark.svg" alt="Firepoint"><div class="bar"></div><div class="name">FIREPOINT</div></div>
</body>
</html>
