<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html,body{margin:0;width:1500px;height:500px;overflow:hidden;background:#050608;font-family:system-ui,-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Arial,sans-serif}
    .wrap{position:relative;width:1500px;height:500px;background:linear-gradient(90deg,rgba(5,6,8,.98),rgba(5,6,8,.76) 45%,rgba(5,6,8,.36)),radial-gradient(circle at 82% 24%,rgba(216,168,74,.25),transparent 360px),radial-gradient(circle at 18% 18%,rgba(47,108,255,.21),transparent 420px),url('../generated/web/firepoint-hero-command-room.jpg') center/cover}
    .wrap:after{content:"";position:absolute;left:90px;right:90px;bottom:56px;height:1px;background:linear-gradient(90deg,transparent,rgba(245,246,242,.38),transparent)}
    .wrap:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 78% 24%,rgba(216,168,74,.14),transparent 210px);pointer-events:none}
    .brand{position:absolute;left:90px;top:110px;color:#f5f6f2;font-size:92px;line-height:.9;font-weight:850;letter-spacing:-.07em;text-shadow:0 24px 80px rgba(0,0,0,.55)}
    .bar{position:absolute;left:94px;top:220px;width:330px;height:5px;background:linear-gradient(90deg,#f5f6f2,#d8a84a,transparent)}
    .sub{position:absolute;left:94px;top:258px;color:rgba(245,246,242,.82);font-size:30px;font-weight:750;letter-spacing:.035em}
    .micro{position:absolute;left:96px;top:318px;color:rgba(245,246,242,.58);font-size:22px;font-weight:800;letter-spacing:.12em}
    .ticker{position:absolute;right:88px;bottom:90px;color:#f4d38b;border:1px solid rgba(216,168,74,.34);background:rgba(5,6,8,.58);backdrop-filter:blur(14px);padding:17px 22px;font-size:32px;font-weight:850;letter-spacing:.09em;box-shadow:inset 0 1px rgba(255,255,255,.08),0 22px 70px rgba(0,0,0,.38)}
    .logo-badge{position:absolute;right:90px;top:76px;width:138px;height:138px;display:grid;place-items:center;border:1px solid rgba(245,246,242,.18);background:linear-gradient(145deg,rgba(255,255,255,.10),rgba(255,255,255,.035));box-shadow:inset 0 1px rgba(255,255,255,.16),0 28px 90px rgba(0,0,0,.55);backdrop-filter:blur(18px)}
    .logo-badge:before{content:"";position:absolute;inset:10px;border:1px solid rgba(216,168,74,.25)}
    .logo-badge:after{content:"";position:absolute;left:24px;right:24px;bottom:22px;height:3px;background:#d8a84a;box-shadow:0 0 24px rgba(216,168,74,.36)}
    .logo-badge img{width:92px;height:92px;display:block;filter:drop-shadow(0 16px 22px rgba(0,0,0,.45))}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-badge"><img src="../brand/firepoint-mark.svg" alt="Firepoint logo"></div>
    <div class="brand">FIREPOINT</div>
    <div class="bar"></div>
    <div class="sub">$2M SPARK → $6B MYTH ARC</div>
    <div class="micro">PRECISION MEME • ROBINHOOD CHAIN • POSITIVE FIRE ONLY</div>
    <div class="ticker">$FIREPOINT</div>
  </div>
</body>
</html>
